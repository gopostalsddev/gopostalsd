<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager GUI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <button id="backendTab" class="active">Backend Tasks</button>
            <button id="frontendTab">Frontend Tasks</button>
            <button id="settingsTab">Settings</button>
        </div>
        <div id="main">
            <h1>Task Manager</h1>
            <div id="taskSections">
                <div id="backendTasks" class="task-section"></div>
                <div id="frontendTasks" class="task-section" style="display: none;"></div>
                <div id="settingsContainer" class="task-section" style="display: none;">
                    <label class="setting-item">
                        <input type="checkbox" id="clearConsoleToggle" checked>
                        <span>Clear console before each task</span> 
                    </label>
                </div>
            </div>
                    
            <div id="consoleContainer">
                <pre id="consoleOutput"></pre>
            </div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
